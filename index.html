<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devadarsh CI/CD</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #fff5f5;
            text-align: center;
        }

        header {
            background-color: #f87171;
            color: white;
            padding: 25px;
        }

        .container {
            margin: 50px auto;
            width: 80%;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #555;
        }

        button {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 12px 20px;
            margin-top: 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #dc2626;
        }

        footer {
            margin-top: 40px;
            background: #7f1d1d;
            color: white;
            padding: 15px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Devadarsh CI/CD Pipeline 🚀</h1>
        <p>Docker | Cloud Build | Google Cloud</p>
    </header>

    <div class="container">
        <div class="card">

            <h2>Hello, World!</h2>

            <p>
                This website is deployed using a complete CI/CD pipeline
                with Docker and Google Cloud Platform.
            </p>

            <button onclick="showMessage()">
                Verify Deployment
            </button>

        </div>
    </div>

    <footer>
        © 2026 Devadarsh CI/CD Pipeline
    </footer>

    <script>
        function showMessage() {
            alert("Deployment Successful!");
        }
    </script>

</body>
</html>
