steps:
# Step 1: Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'us-central1-docker.pkg.dev/project-c0452e10-fe9f-40af-962/helloworld/sample-cicd:$BUILD_ID',
      '.'
    ]

# Step 2: Push image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'us-central1-docker.pkg.dev/project-c0452e10-fe9f-40af-962/helloworld/sample-cicd:$BUILD_ID'
    ]

# Step 3: Create Instance Template
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      gcloud compute instance-templates create-with-container sample-cicd-template-$BUILD_ID \
        --machine-type=e2-micro \
        --tags=sample-cicd-node \
        --container-image=us-central1-docker.pkg.dev/project-c0452e10-fe9f-40af-962/helloworld/sample-cicd:$BUILD_ID \
        --boot-disk-size=10GB

# Step 4: Rolling Update to MIG
- name: 'gcr.io/cloud-builders/gcloud'
  args:
    - 'compute'
    - 'instance-groups'
    - 'managed'
    - 'rolling-action'
    - 'start-update'
    - 'sample-cicd-mig'
    - '--version=template=sample-cicd-template-$BUILD_ID'
    - '--zone=us-central1-a'

images:
- 'us-central1-docker.pkg.dev/project-c0452e10-fe9f-40af-962/helloworld/sample-cicd:$BUILD_ID'

options:
  logging: CLOUD_LOGGING_ONLY